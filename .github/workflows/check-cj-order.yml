name: Check CJ order

on:
  workflow_dispatch:
    inputs:
      pid:
        description: "CJ product id"
        default: "1737398203613454336"
      zip:
        description: "Destination ZIP"
        default: "10118"
      state:
        description: "State code"
        default: "NY"
      pay:
        description: "Also test wallet pay (safe on unfunded wallet)"
        type: boolean
        default: true

jobs:
  cjorder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Try CJ order
        env:
          CJ_API_KEY: ${{ secrets.CJ_API_KEY }}
        working-directory: backend
        run: python check_cj_order.py --pid "${{ github.event.inputs.pid }}" --zip "${{ github.event.inputs.zip }}" --state "${{ github.event.inputs.state }}" ${{ github.event.inputs.pay == 'true' && '--pay' || '' }}
