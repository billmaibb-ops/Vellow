name: Daily owner report

# Once a day, ask the backend to build the owner snapshot (orders, revenue,
# profit, Stripe balance/disputes, CJ wallet, catalog health) and email it to
# OWNER_EMAIL. Runs on GitHub's servers so it fires even when nobody's online.
#
# Setup (already in place if tracking emails work):
#   - Repo secret ADMIN_TOKEN  = the admin token set on the Render backend
#   - Render env OWNER_EMAIL    = where the report is sent
#   - Render env RESEND_API_KEY = the email sender (same one order emails use)

on:
  schedule:
    - cron: "0 14 * * *"   # 14:00 UTC = 7:00am Pacific (PDT). Change to reschedule.
  workflow_dispatch: {}

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger daily report email
        run: |
          if [ -z "${{ secrets.ADMIN_TOKEN }}" ]; then
            echo "ADMIN_TOKEN secret not set — skipping"; exit 0
          fi
          resp=$(curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.ADMIN_TOKEN }}" \
            https://vellow-backend.onrender.com/api/admin/daily-report) || {
              echo "Report request failed"; exit 1; }
          echo "$resp" | head -c 400
          echo
          echo "$resp" | grep -q '"emailed":true' \
            && echo "✅ Report emailed" \
            || echo "⚠️  Report generated but not emailed (OWNER_EMAIL unset on Render?)"
